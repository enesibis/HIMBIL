name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server (Node/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  client:
    name: Client (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
