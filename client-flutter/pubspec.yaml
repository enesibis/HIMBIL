name: himbil
description: "Hımbıl — gerçek zamanlı çok oyunculu kart oyunu, Flutter mobil istemcisi."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  flutter_svg: ^2.3.0
  audioplayers: ^6.1.0
  web_socket_channel: ^3.0.3
  http: ^1.6.0
  sentry_flutter: ^8.14.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  share_plus: ^13.2.0
  app_links: ^7.0.0
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  fake_async: ^1.3.3

# flutter_launcher_icons: `dart run flutter_launcher_icons` ile Android/iOS
# uygulama simgelerini design/logo-export/himbil-logo-3a-icon.png kaynağından üretir.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FBF3E4"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/himbil_logo.png
    - assets/avatars/
    - assets/card_backs/
    - assets/fruits/
    - assets/frames/
    - assets/sounds/
    - assets/music/

  # Baloo2 ve Nunito variable font (wght eksenli); tek asset yeterli çünkü
  # ağırlık seçimi AppText içinde TextStyle.fontVariations ile yapılıyor —
  # burada aynı dosyayı birden çok "weight" altında tekrarlamak wght
  # eksenini ayarlamaz, sadece yanıltıcı olur.
  fonts:
    - family: Baloo2
      fonts:
        - asset: assets/fonts/Baloo2.ttf
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito.ttf
